<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>{{TITLE}}</title>
 <style>
 @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Playfair+Display:wght@700;900&display=swap');

 :root {
 --bg-dark: #0a0e17;
 --bg-card: #111827;
 --bg-card-hover: #1a2332;
 --accent-blue: #3b82f6;
 --accent-red: #ef4444;
 --accent-green: #10b981;
 --accent-amber: #f59e0b;
 --accent-purple: #8b5cf6;
 --text-primary: #f1f5f9;
 --text-secondary: #94a3b8;
 --text-muted: #64748b;
 --border: #1e293b;
 }

 * { margin: 0; padding: 0; box-sizing: border-box; }

 body {
 font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
 background: var(--bg-dark);
 color: var(--text-primary);
 line-height: 1.8;
 overflow-x: hidden;
 }

 .hero {
 position: relative;
 background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
 padding: 80px 20px 60px;
 text-align: center;
 overflow: hidden;
 }

 .hero::before {
 content: '';
 position: absolute;
 top: -50%; left: -50%;
 width: 200%; height: 200%;
 background: radial-gradient(circle at 30% 50%, rgba(59,130,246,0.08) 0%, transparent 50%),
 radial-gradient(circle at 70% 50%, rgba(139,92,246,0.06) 0%, transparent 50%);
 animation: heroGlow 15s ease-in-out infinite alternate;
 }

 @keyframes heroGlow {
 0% { transform: translate(0, 0); }
 100% { transform: translate(-5%, -5%); }
 }

 .hero-badge {
 display: inline-block;
 background: rgba(59,130,246,0.15);
 border: 1px solid rgba(59,130,246,0.3);
 color: var(--accent-blue);
 padding: 6px 18px;
 border-radius: 20px;
 font-size: 13px;
 font-weight: 500;
 margin-bottom: 20px;
 letter-spacing: 1px;
 }

 .hero h1 {
 font-family: 'Playfair Display', serif;
 font-size: clamp(28px, 5vw, 52px);
 font-weight: 900;
 line-height: 1.2;
 margin-bottom: 16px;
 position: relative;
 background: linear-gradient(135deg, #f1f5f9 0%, #93c5fd 100%);
 -webkit-background-clip: text;
 -webkit-text-fill-color: transparent;
 background-clip: text;
 }

 .hero-sub {
 font-size: clamp(14px, 2vw, 18px);
 color: var(--text-secondary);
 max-width: 700px;
 margin: 0 auto 30px;
 position: relative;
 }

 .hero-meta {
 display: flex;
 justify-content: center;
 gap: 24px;
 flex-wrap: wrap;
 font-size: 13px;
 color: var(--text-muted);
 position: relative;
 }

 .hero-meta span { display: flex; align-items: center; gap: 6px; }

 .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
 .section { margin: 50px 0; }

 .section-title {
 font-size: 22px;
 font-weight: 700;
 margin-bottom: 24px;
 padding-left: 16px;
 border-left: 4px solid var(--accent-blue);
 display: flex;
 align-items: center;
 gap: 10px;
 }

 .card {
 background: var(--bg-card);
 border: 1px solid var(--border);
 border-radius: 12px;
 padding: 28px;
 margin-bottom: 20px;
 transition: transform 0.2s, border-color 0.2s;
 }

 .card:hover {
 border-color: rgba(59,130,246,0.3);
 transform: translateY(-2px);
 }

 .card h3 {
 font-size: 18px;
 font-weight: 700;
 margin-bottom: 14px;
 display: flex;
 align-items: center;
 gap: 8px;
 }

 .card p { color: var(--text-secondary); font-size: 15px; margin-bottom: 12px; }

 .tag {
 display: inline-block;
 padding: 3px 10px;
 border-radius: 6px;
 font-size: 12px;
 font-weight: 500;
 }

 .tag-red { background: rgba(239,68,68,0.15); color: #fca5a5; }
 .tag-green { background: rgba(16,185,129,0.15); color: #6ee7b7; }
 .tag-blue { background: rgba(59,130,246,0.15); color: #93c5fd; }
 .tag-amber { background: rgba(245,158,11,0.15); color: #fcd34d; }
 .tag-purple { background: rgba(139,92,246,0.15); color: #c4b5fd; }

 .overview-grid {
 display: grid;
 grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
 gap: 16px;
 margin-bottom: 24px;
 }

 .stat-box {
 background: var(--bg-card);
 border: 1px solid var(--border);
 border-radius: 10px;
 padding: 20px;
 text-align: center;
 }

 .stat-box .number { font-size: 28px; font-weight: 900; margin-bottom: 4px; }
 .stat-box .label { font-size: 13px; color: var(--text-muted); }

 .number-red { color: var(--accent-red); }
 .number-green { color: var(--accent-green); }
 .number-blue { color: var(--accent-blue); }
 .number-amber { color: var(--accent-amber); }

 .quote-box {
 background: linear-gradient(135deg, rgba(59,130,246,0.06), rgba(139,92,246,0.04));
 border-left: 3px solid var(--accent-blue);
 padding: 20px 24px;
 margin: 16px 0;
 border-radius: 0 10px 10px 0;
 font-style: italic;
 color: var(--text-secondary);
 font-size: 15px;
 }

 .quote-box .timestamp {
 display: block;
 margin-top: 8px;
 font-size: 12px;
 color: var(--text-muted);
 font-style: normal;
 }

 .key-takeaway {
 display: flex;
 gap: 16px;
 padding: 20px;
 background: var(--bg-card);
 border: 1px solid var(--border);
 border-radius: 10px;
 margin-bottom: 12px;
 }

 .key-takeaway .num {
 width: 36px; height: 36px; min-width: 36px;
 background: linear-gradient(135deg, #3b82f6, #1d4ed8);
 border-radius: 50%;
 display: flex; align-items: center; justify-content: center;
 font-weight: 700; font-size: 15px;
 }

 .key-takeaway .content h4 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
 .key-takeaway .content p { font-size: 14px; color: var(--text-muted); margin: 0; }

 .data-table { width: 100%; border-collapse: collapse; font-size: 14px; }

 .data-table th {
 background: rgba(59,130,246,0.1);
 text-align: left;
 padding: 12px 16px;
 font-weight: 600;
 color: var(--accent-blue);
 border-bottom: 1px solid var(--border);
 }

 .data-table td {
 padding: 10px 16px;
 border-bottom: 1px solid rgba(30,41,59,0.5);
 color: var(--text-secondary);
 }

 .data-table tr:hover td { background: rgba(59,130,246,0.04); }

 .footer {
 text-align: center;
 padding: 40px 20px;
 color: var(--text-muted);
 font-size: 13px;
 border-top: 1px solid var(--border);
 margin-top: 60px;
 }

 .footer a { color: var(--accent-blue); text-decoration: none; }

 @media (max-width: 768px) {
 .hero { padding: 50px 16px 40px; }
 .card { padding: 20px; }
 .overview-grid { grid-template-columns: repeat(2, 1fr); }
 .key-takeaway { flex-direction: column; gap: 10px; }
 .data-table { font-size: 13px; }
 .data-table th, .data-table td { padding: 8px 10px; }
 }

 @media (max-width: 480px) {
 .overview-grid { grid-template-columns: 1fr; }
 }
 </style>
</head>
<body>

<div class="hero">
 <div class="hero-badge">{{BADGE}}</div>
 <h1>{{HERO_TITLE}}</h1>
 <p class="hero-sub">{{HERO_SUB}}</p>
 <div class="hero-meta">
 <span>📺 {{CHANNEL}}</span>
 <span>⏱️ {{DURATION}}</span>
 <span>📅 {{DATE}}</span>
 {{META_EXTRA}}
 </div>
</div>

<div class="container">

{{CONTENT}}

</div>

<div class="footer">
 <p>本报告基于视频字幕生成，所有分析基于实际内容，引用已标注时间戳</p>
 <p>仅供参考，不构成投资建议</p>
 <p style="margin-top: 8px;">Generated by Arc ⚡ · {{GEN_DATE}}</p>
</div>

</body>
</html>
